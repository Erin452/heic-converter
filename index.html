



<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEIC 批次轉檔工具</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Sharp" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f3f2f8; }
        .m3-card { background: white; border-radius: 28px; width: 100%; max-width: 500px; }
        .m3-btn { background: #6750a4; color: white; border-radius: 100px; transition: all 0.3s; }
        .m3-btn:disabled { background: #e1e1e1; color: #999; cursor: not-allowed; }
        .loader-small { width: 16px; height: 16px; border: 2px solid #6750a4; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen p-4">

<div class="m3-card p-8 shadow-sm text-center border border-gray-100">
    <header class="mb-6">
        <h1 class="text-2xl font-medium text-gray-800">HEIC 多圖轉檔</h1>
        <p class="text-sm text-gray-500 mt-1">批次轉換並自動打包下載 (上限 30 張)</p>
    </header>

    <label class="block border-2 border-dashed border-purple-200 bg-purple-50 rounded-2xl p-8 cursor-pointer hover:bg-purple-100 transition-colors">
        <input type="file" id="upload" accept=".heic" multiple class="hidden">
        <span class="material-icons-sharp text-4xl text-purple-600">collections</span>
        <p class="mt-2 text-sm font-medium text-purple-800">選擇 HEIC 照片</p>
    </label>

    <div id="status" class="mt-4 text-sm text-gray-600 font-medium h-6"></div>

    <div id="file-list" class="mt-4 space-y-2 max-h-48 overflow-y-auto px-2"></div>

    <div class="mt-8 flex flex-col gap-3">
        <button id="downloadAllBtn" class="m3-btn py-3 px-6 hidden shadow-md">
            <span class="flex items-center justify-center gap-2">
                <i class="material-icons-sharp">auto_fix_high</i> 下載 ZIP 打包檔
            </span>
        </button>
        
        <div id="loading" class="hidden flex-col items-center gap-2">
            <div class="loader-small"></div>
            <span class="text-xs text-purple-700">正在處理中...</span>
        </div>
    </div>

    <footer class="mt-8 pt-4 border-t border-gray-100 text-[10px] text-gray-400">
        🔒 本地安全加密轉換：照片不會傳送到任何伺服器。
    </footer>
</div>

<script>
    const upload = document.getElementById('upload');
    const status = document.getElementById('status');
    const fileList = document.getElementById('file-list');
    const downloadAllBtn = document.getElementById('downloadAllBtn');
    const loading = document.getElementById('loading');

    upload.addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        
        // --- 限制檢查 ---
        if (files.length > 30) {
            alert("⚠️ 為了確保瀏覽器運作順暢，一次最多只能轉換 30 張照片。");
            upload.value = ""; 
            return;
        }
        if (files.length === 0) return;

        // 初始化 UI
        fileList.innerHTML = "";
        downloadAllBtn.classList.add('hidden');
        loading.classList.remove('hidden');
        status.innerText = `準備處理 ${files.length} 張照片...`;

        const zip = new JSZip();
        let successCount = 0;

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const item = document.createElement('div');
            item.className = "flex justify-between items-center p-3 bg-gray-50 rounded-xl text-xs border border-gray-100";
            item.innerHTML = `<span class="truncate pr-4">${file.name}</span><span id="loader-${i}" class="loader-small"></span>`;
            fileList.appendChild(item);

            try {
                // 轉換
                const jpgBlob = await heic2any({
                    blob: file,
                    toType: "image/jpeg",
                    quality: 0.8
                });

                const fileName = file.name.replace(/\.[^/.]+$/, "") + ".jpg";
                
                // 加入 ZIP 
                zip.file(fileName, jpgBlob);
                
                // 更新該列 UI
                document.getElementById(`loader-${i}`).outerHTML = `<span class="text-green-600 material-icons-sharp !text-sm">check_circle</span>`;
                successCount++;
                status.innerText = `正在轉換 (${successCount}/${files.length})...`;
            } catch (err) {
                document.getElementById(`loader-${i}`).outerHTML = `<span class="text-red-500 material-icons-sharp !text-sm">error</span>`;
            }
        }

        // 全部轉完後生成 ZIP
        if (successCount > 0) {
            const content = await zip.generateAsync({type: "blob"});
            const zipUrl = URL.createObjectURL(content);
            
            downloadAllBtn.onclick = () => {
                const link = document.createElement('a');
                link.href = zipUrl;
                link.download = `converted_images_${Date.now()}.zip`;
                link.click();
            };
            
            downloadAllBtn.classList.remove('hidden');
            status.innerText = `✅ 成功轉換 ${successCount} 張照片！`;
        } else {
            status.innerText = "❌ 轉換失敗。";
        }
        
        loading.classList.add('hidden');
    });
</script>

</body>
</html>
